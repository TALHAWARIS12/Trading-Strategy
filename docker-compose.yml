version: '3.8'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-trading-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      TRADING_PAIRS: ${TRADING_PAIRS:-BTCUSDT,ETHUSDT,SOLUSDT}
      PAPER_BALANCE: ${PAPER_BALANCE:-10000}
      RISK_PERCENT: ${RISK_PERCENT:-1}
      RISK_REWARD_RATIO: ${RISK_REWARD_RATIO:-2}
      ATR_MULTIPLIER: ${ATR_MULTIPLIER:-1.5}
      PORT: 3000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - trading-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

networks:
  trading-network:
    driver: bridge
